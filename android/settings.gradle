// For React Native 0.76.0 compatibility
def nodeExecutableAndArgs = ["node"]
def reactNativeRoot = rootProject.projectDir.parentFile

def reactNativeGradlePluginPath = new File(
    ["node", "--print", "require.resolve('react-native-gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootProject.projectDir).text.trim()
).getParentFile().absolutePath

def expoPluginsPath = new File(
    ["node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootProject.projectDir).text.trim(),
    "../android/expo-gradle-plugin"
).absolutePath

apply from: new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootProject.projectDir).text.trim()).getParentFile().getAbsolutePath() + "/react.gradle"

include ':app'
includeBuild(reactNativeGradlePluginPath)
includeBuild(expoPluginsPath)

apply from: new File(expoPluginsPath, "expo-autolinking-settings.gradle")

rootProject.name = 'Sober Dailies'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
